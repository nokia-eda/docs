                              format: int32
                              maximum: 1800000
                              minimum: 0
                              type: integer
                            routerLifetime:
                              default: 1800
                              description: Router lifetime in seconds for default
                                gateway.
                              format: int32
                              maximum: 9000
                              minimum: 0
