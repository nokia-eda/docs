                              maximum: 15
                              minimum: 1
                              type: integer
                            numMoves:
                              default: 5
                              description: Number of moves a mac is allowed within
                                the monitoring-window, before it is declared duplicate.
                              minimum: 3
                              type: integer
                          type: object
                        macLearning:
