                          properties:
                            proxyARP:
                              default: false
                              description: Select whether Proxy ARP should be enabled.
                              type: boolean
                            proxyND:
                              default: false
                              description: Select whether Proxy ND should be enabled.
                              type: boolean
                          type: object
