                                  description: AS Path Options
                                  properties:
                                    allowOwnAS:
                                      default: 0
                                      description: The maximum number of times the
                                        global AS number or a local AS number of the
                                        BGP instance can appear in any received AS_PATH
                                        before it is considered a loop and considered
                                        invalid.
                                      maximum: 255
                                      minimum: 0
                                      type: integer
                                    removePrivateAS:
                                      description: Options for removing private AS
                                        numbers (2-byte and 4-byte) from the advertised
                                        AS path towards all peers.
                                      properties:
                                        ignorePeerAS:
                                          default: false
                                          description: If set to true then do not
                                            delete or replace a private AS number
                                            that is the same as the peer AS number.
                                          type: boolean
                                        leadingOnly:
                                          default: false
                                          description: If set to true then only delete
                                            or replace private AS numbers that appear
                                            before the first occurrence of a non-private
                                            ASN in the sequence of most recent ASNs
