apiVersion: core.eda.nokia.com/v1
kind: Manifest
metadata:
  name: services
spec:
  group: services.eda.nokia.com
  version: v2
  title: Services
  description: |
    This application provides EVPN services for various Network Operating Systems.
  image: ghcr.io/nokia-eda/apps/services:v6.999.0
  gitReference: 1da44402c90fbeba1161ccb8ea3350ef0353843d
  gitPathPrefix: /
  author: Nokia
  appInfo:
    documentation: services/docs
    categories:
      - "networking"
  supportedEndpoints:
    - "srl:24.10.*"
    - "srl:25.3.*"
    - "srl:25.7.*"
    - "srl:25.10.*"
    - "srl:26.3.*"
    - "sros:24.10.r4+"
    - "sros:25.3.r2+"
    - "sros:25.7.*"
    - "sros:25.10.*"
    - "sros:26.3.*"
    - "eos:4.33.2f:beta"
    - "nxos:10.5.2:alpha"
  supportedCoreVersions:
    - "v5.0"
  components:
    - crd:
        path: services/crds/services.eda.nokia.com_vlans.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_vlans.json
        ui:
          category: Virtual Networks
          name: VLANs
          icon: LogicalObject
        api:
          expose: readWrite
        conversionScript: services/intents/vlan/conversion_v2.py
    - crd:
        path: services/crds/services.eda.nokia.com_vlanstates.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_vlanstates.json
        api:
          expose: none
    - crd:
        path: services/crds/services.eda.nokia.com_virtualnetworks.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_virtualnetworks.json
        ui:
          category: Virtual Networks
          name: Virtual Networks
          icon: Service
        api:
          expose: readWrite
        conversionScript: services/intents/virtualnetwork/conversion_v2.py
    - crd:
        path: services/crds/services.eda.nokia.com_virtualnetworkstates.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_virtualnetworkstates.json
        api:
          expose: none
    - crd:
        path: services/crds/services.eda.nokia.com_routers.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_routers.json
        ui:
          category: Virtual Networks
          name: Routers
          icon: RouterCircle
        api:
          expose: readWrite
        conversionScript: services/intents/router/conversion_v2.py
    - crd:
        path: services/crds/services.eda.nokia.com_routerstates.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_routerstates.json
        api:
          expose: none
    - crd:
        path: services/crds/services.eda.nokia.com_routerdeployments.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_routerdeployments.json
        api:
          expose: none
        conversionScript: services/intents/routerdeployment/conversion_v2.py
    - crd:
        path: services/crds/services.eda.nokia.com_bridgedomains.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_bridgedomains.json
        ui:
          category: Virtual Networks
          name: Bridge Domains
          icon: Intranet
        kubernetes:
          exportPolicy: all # needed for connect controllers
        api:
          expose: readWrite
        conversionScript: services/intents/bridgedomain/conversion_v2.py
    - crd:
        path: services/crds/services.eda.nokia.com_bridgedomainstates.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_bridgedomainstates.json
        api:
          expose: none
    - crd:
        path: services/crds/services.eda.nokia.com_bridgedomaindeployments.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_bridgedomaindeployments.json
        api:
          expose: none
        conversionScript: services/intents/bridgedomaindeployment/conversion_v2.py
    - crd:
        path: services/crds/services.eda.nokia.com_bridgeinterfaces.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_bridgeinterfaces.json
        ui:
          category: Virtual Networks
          name: Bridge Interfaces
          icon: Interface
        api:
          expose: readWrite
        conversionScript: services/intents/bridgeinterface/conversion_v2.py
    - crd:
        path: services/crds/services.eda.nokia.com_bridgeinterfacestates.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_bridgeinterfacestates.json
        api:
          expose: none
    - crd:
        path: services/crds/services.eda.nokia.com_routedinterfaces.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_routedinterfaces.json
        ui:
          category: Virtual Networks
          name: Routed Interfaces
          icon: DestinationSubnet
        api:
          expose: readWrite
        conversionScript: services/intents/routedinterface/conversion_v2.py
    - crd:
        path: services/crds/services.eda.nokia.com_routedinterfacestates.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_routedinterfacestates.json
        api:
          expose: none
    - crd:
        path: services/crds/services.eda.nokia.com_irbinterfaces.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_irbinterfaces.json
        ui:
          category: Virtual Networks
          name: IRB Interfaces
          icon: ArrowInOut
        api:
          expose: readWrite
        conversionScript: services/intents/irbinterface/conversion_v2.py
    - crd:
        path: services/crds/services.eda.nokia.com_irbinterfacestates.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_irbinterfacestates.json
        api:
          expose: none
    - crd:
        path: services/crds/services.eda.nokia.com_dhcprelays.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_dhcprelays.json
        ui:
          category: DHCP
          name: DHCP Relay
          icon: IcmpPing
        api:
          expose: readWrite
        conversionScript: services/intents/dhcprelay/conversion_v2.py
    - crd:
        path: services/crds/services.eda.nokia.com_stateconfigs.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_stateconfigs.json
        api:
          expose: none
        conversionScript: services/intents/stateconfig/conversion_v2.py
    - script:
        path: services/intents/stateconfig/stateconfig_intent.py
        type: state
        trigger:
          kind: StateConfig
    - script:
        path: services/intents/vlan/vlan_intent.py
        type: config
        trigger:
          kind: VLAN
    - script:
        path: services/intents/vlanstate/vlanstate_intent.py
        type: state
        trigger:
          kind: VLANState
    - script:
        path: services/intents/virtualnetwork/virtualnetwork_intent.py
        type: config
        trigger:
          kind: VirtualNetwork
    - script:
        path: services/intents/virtualnetworkstate/virtualnetworkstate_intent.py
        type: state
        trigger:
          kind: VirtualNetworkState
    - script:
        path: services/intents/router/router_intent.py
        type: config
        trigger:
          kind: Router
    - script:
        path: services/intents/routerstate/routerstate_intent.py
        type: state
        trigger:
          kind: RouterState
    - script:
        path: services/intents/routerdeployment/routerdeployment_intent.py
        type: config
        trigger:
          kind: RouterDeployment
    - script:
        path: services/intents/bridgedomain/bridgedomain_intent.py
        type: config
        trigger:
          kind: BridgeDomain
    - script:
        path: services/intents/bridgedomainstate/bridgedomainstate_intent.py
        type: state
        trigger:
          kind: BridgeDomainState
    - script:
        path: services/intents/bridgedomaindeployment/bridgedomaindeployment_intent.py
        type: config
        trigger:
          kind: BridgeDomainDeployment
    - script:
        path: services/intents/bridgeinterface/bridgeinterface_intent.py
        type: config
        trigger:
          kind: BridgeInterface
    - script:
        path: services/intents/bridgeinterfacestate/bridgeinterfacestate_intent.py
        type: state
        trigger:
          kind: BridgeInterfaceState
    - script:
        path: services/intents/routedinterface/routedinterface_intent.py
        type: config
        trigger:
          kind: RoutedInterface
    - script:
        path: services/intents/routedinterfacestate/routedinterfacestate_intent.py
        type: state
        trigger:
          kind: RoutedInterfaceState
    - script:
        path: services/intents/irbinterface/irbinterface_intent.py
        type: config
        trigger:
          kind: IRBInterface
    - script:
        path: services/intents/irbinterfacestate/irbinterfacestate_intent.py
        type: state
        trigger:
          kind: IRBInterfaceState
    - script:
        path: services/intents/dhcprelay/dhcprelay_intent.py
        type: config
        trigger:
          kind: DHCPRelay
    - view:
        path: services/ui/vlan-dashboard.json
        ui:
          category: Virtual Networks
          name: VLANs
    - view:
        path: services/ui/router-dashboard.json
        ui:
          category: Virtual Networks
          name: Routers
    - view:
        path: services/ui/vnet-dashboard.json
        ui:
          category: Virtual Networks
          name: Virtual Networks
    - view:
        path: services/ui/bridgedomain-dashboard.json
        ui:
          category: Virtual Networks
          name: Bridge Domains
    - cr:
        path: services/workflows/edgeping/core_v1_flowdefinition.yaml
    - crd:
        api:
          expose: readWrite
        namespaced: true
        path: services/crds/services.eda.nokia.com_edgepings.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_edgepings.json
        workflow: true
        conversionScript: services/intents/edgeping/conversion_v2.py
        ui:
          name: Edge Ping
    - cr:
        path: services/alarms/alarms.yaml
    - crd:
        api:
          expose: readWrite
        path: services/crds/services.eda.nokia.com_routerinterconnects.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_routerinterconnects.json
        ui:
          category: Virtual Networks
          name: Router Interconnect
          icon: ConnectionExternal
    - crd:
        api:
          expose: readWrite
        path: services/crds/services.eda.nokia.com_bridgedomaininterconnects.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_bridgedomaininterconnects.json
        ui:
          category: Virtual Networks
          name: Bridge Domain Interconnect
          icon: ConnectionLt2P
    - script:
        path: services/intents/bridgedomaininterconnect/config_intent.py
        trigger:
          kind: BridgeDomainInterconnect
        type: config
    - script:
        path: services/intents/routerinterconnect/config_intent.py
        trigger:
          kind: RouterInterconnect
        type: config
    - crd:
        api:
          expose: none
        path: services/crds/services.eda.nokia.com_bridgedomaininterconnectstates.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_bridgedomaininterconnectstates.json
    - crd:
        api:
          expose: none
        path: services/crds/services.eda.nokia.com_routerinterconnectstates.yaml
        schema: services/openapiv3/eda_oas_services.eda.nokia.com_routerinterconnectstates.json
    - script:
        path: services/intents/bridgedomaininterconnectstate/state_intent.py
        trigger:
          kind: BridgeDomainInterconnectState
        type: state
    - script:
        path: services/intents/routerinterconnectstate/state_intent.py
        trigger:
          kind: RouterInterconnectState
        type: state
  dependencies:
    - file:
        path: services/intents
    - file:
        path: services/api
    - file:
        path: common/
    - file:
        path: utils/
    - file:
        path: filters/
    - file:
        path: protocols/
    - file:
        path: routing/
    - file:
        path: routingpolicies/
    - file:
        path: qos/
    - file:
        path: interfaces/
    - file:
        path: security/
    - file:
        path: services/alarms/pysrc
    - file:
        path: services/api/v2/pysrc
  requirements:
    - appId: protocols.eda.nokia.com
      version: v6.999.0
    - appId: routingpolicies.eda.nokia.com
      version: v6.999.0
    - appId: interfaces.eda.nokia.com
      version: v6.999.0
    - appId: qos.eda.nokia.com
      version: v6.999.0
    - appId: security.eda.nokia.com
      version: v6.999.0
    - appId: filters.eda.nokia.com
      version: v6.999.0
