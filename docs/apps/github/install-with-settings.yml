apiVersion: appstore.eda.nokia.com/v1
kind: AppInstaller
metadata:
  name: github-install-sized
  namespace: eda-system
spec:
  operation: install
  apps:
    - appId: github.eda.nokia.com
      catalog: eda-catalog-builtin-apps
      version:
        value: latest
        type: alias
      appSettings:
        proxyConfigName: proxy-config
        githubCPULimit: "2"
        githubMemoryLimit: 2Gi
