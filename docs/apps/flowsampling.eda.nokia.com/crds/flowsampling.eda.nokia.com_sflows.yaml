---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: sflows.flowsampling.eda.nokia.com
spec:
  group: flowsampling.eda.nokia.com
  names:
    kind: SFlow
    listKind: SFlowList
    plural: sflows
    singular: sflow
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SFlow is the Schema for the sflows API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SFlowSpec allows the configuration of sFlow sampling on selected
              interfaces.
            properties:
              collectors:
                description: A list of sFlow collectors to which sampled data is sent.
                items:
                  properties:
                    address:
                      description: IP address of the sFlow collector.
                      type: string
                    port:
                      default: 6343
                      description: UDP port number of the sFlow collector.
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                    router:
                      description: Selects a Router used to reach the sFlow collector.
                        Router or RouterSelector required only when the `Router` kind
                        is used, otherwise should be empty.
                      type: string
                    routerKind:
                      description: Kind of the router used to reach the sFlow collector.
                      enum:
                      - DefaultRouter
                      - Router
                      - ManagementRouter
                      type: string
                    routerSelectors:
                      description: Selects router resources to reach the sFlow collector.
                        Router or RouterSelector required only when the `Router` kind
                        is used, otherwise should be empty.
                      items:
                        type: string
                      type: array
                  required:
                  - address
                  - routerKind
                  type: object
                minItems: 1
                type: array
              dscp:
                description: DSCP value to use for sFlow packets. If not specified,
                  the system default DSCP value is used.
                format: int32
                maximum: 63
                minimum: 0
                type: integer
              interfaceSelectors:
                description: Specifies a list of label selectors to filter the interfaces
                  on which to enable sFlow sampling. If both Interfaces and InterfaceSelector
                  are used, the union (logical OR) of the two sets is used.
                items:
                  type: string
                type: array
              interfaces:
                description: Specifies a list of Interfaces on which to enable sFlow
                  sampling. If both Interfaces and InterfaceSelector are used, the
                  union (logical OR) of the two sets is used.
                items:
                  type: string
                type: array
              mode:
                default: Ingress
                description: Specifies the sampling mode (ingress, egress, or both)
                  for sFlow sampling on the selected interfaces. Ingress is used by
                  default.
                enum:
                - Ingress
                - Egress
                - Both
                type: string
              rate:
                default: 1048576
                description: 'Sampling rate. For example, a value of 16384 means that
                  one out of every 16384 packets is sampled. [Default: 1048576]'
                format: int32
                minimum: 1
                type: integer
              sampleSizeBytes:
                default: 256
                description: 'Sample size (in bytes). [default: 256]'
                format: int32
                maximum: 512
                minimum: 64
                type: integer
            required:
            - collectors
            type: object
          status:
            description: SFlowStatus defines the observed state of SFlow
            properties:
              collectors:
                description: List of sFlow collectors associated with the SFlow.
                items:
                  properties:
                    address:
                      type: string
                    node:
                      type: string
                    router:
                      type: string
                    routerKind:
                      type: string
                  required:
                  - address
                  - node
                  - routerKind
                  type: object
                type: array
              health:
                description: Indicates the health score of the SFlow.
                type: integer
              healthScoreReason:
                description: Indicates the reason for the health score.
                type: string
              interfaces:
                description: List of Interfaces attached to the SFlow.
                items:
                  properties:
                    interfaces:
                      items:
                        type: string
                      type: array
                    node:
                      type: string
                  required:
                  - interfaces
                  - node
                  type: object
                type: array
              lastChangeTime:
                description: The time when the state of the resource last changed.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
