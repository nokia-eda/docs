apiVersion: core.eda.nokia.com/v1
kind: Manifest
metadata:
  name: bootstrap
spec:
  group: bootstrap.eda.nokia.com
  version: v1
  title: Bootstrap
  description: |
    This application provides device bootstrap for various Network Operating Systems.

    It generates initial device configuration for Zero Touch Provisioning (ZTP).
  image: ghcr.io/nokia-eda/apps/bootstrap:v6.999.0
  gitReference: 1da44402c90fbeba1161ccb8ea3350ef0353843d
  gitPathPrefix: /
  author: Nokia
  appInfo:
    categories:
      - "core"
    documentation: bootstrap/docs
  supportedEndpoints:
    - "srl:24.10.*"
    - "srl:25.3.*"
    - "srl:25.7.*"
    - "srl:25.10.*"
    - "srl:26.3.*"
    - "sros:24.10.r4+"
    - "sros:25.3.r2+"
    - "sros:25.7.*"
    - "sros:25.10.*"
    - "sros:26.3.*"
    - "eos:4.33.2f:beta"
    - "nxos:10.5.2:alpha"
  supportedCoreVersions:
    - "v5.0"
  components:
    - crd:
        path: bootstrap/crds/bootstrap.eda.nokia.com_inits.yaml
        schema: bootstrap/openapiv3/eda_oas_bootstrap.eda.nokia.com_inits.json
        ui:
          category: Node Onboarding
          name: Bootstrap
          icon: Bulk
          panel: system_administration
        api:
          expose: readWrite
        conversionScript: bootstrap/intents/init/conversion_v1.py
    - crd:
        path: bootstrap/crds/bootstrap.eda.nokia.com_managementrouters.yaml
        schema: bootstrap/openapiv3/eda_oas_bootstrap.eda.nokia.com_managementrouters.json
        ui:
          category: Node Onboarding
          name: Management Routers
          icon: IcmpPing
        api:
          expose: readWrite
        conversionScript: bootstrap/intents/managementrouter/conversion_v1.py
    - crd:
        path: bootstrap/crds/bootstrap.eda.nokia.com_managementrouterstates.yaml
        schema: bootstrap/openapiv3/eda_oas_bootstrap.eda.nokia.com_managementrouterstates.json
        api:
          expose: none
    - cr:
        path: bootstrap/resources/init-base.yaml
    - script:
        path: bootstrap/intents/init/init_intent.py
        type: config
        trigger:
          kind: Init
          #group:
          #version:
    - script:
        path: bootstrap/intents/managementrouter/managementrouter_intent.py
        type: config
        trigger:
          kind: ManagementRouter
    - script:
        path: bootstrap/intents/managementrouterstate/managementrouterstate_intent.py
        type: state
        trigger:
          kind: ManagementRouterState
    - cr:
        path: bootstrap/workflows/rotatecertificate/core_v1_flowdefinition.yaml
    - crd:
        api:
          expose: readWrite
        path: bootstrap/crds/bootstrap.eda.nokia.com_rotatecertificates.yaml
        schema: bootstrap/openapiv3/eda_oas_bootstrap.eda.nokia.com_rotatecertificates.json
        workflow: true
        ui:
          name: Rotate Certificates
        conversionScript: bootstrap/intents/rotatecertificate/conversion_v1.py
    - crd:
        api:
          expose: read
        path: bootstrap/crds/bootstrap.eda.nokia.com_satellites.yaml
        schema: bootstrap/openapiv3/eda_oas_bootstrap.eda.nokia.com_satellites.json
        ui:
          category: Topology
          name: Satellites
          icon: Satellite
    - crd:
        api:
          expose: none
        path: bootstrap/crds/bootstrap.eda.nokia.com_satellitestates.yaml
        schema: bootstrap/openapiv3/eda_oas_bootstrap.eda.nokia.com_satellitestates.json
    - script:
        path: bootstrap/intents/satellitestate/state_intent.py
        trigger:
          kind: SatelliteState
        type: state
  requirements:
    - appId: aaa.eda.nokia.com
      version: v6.999.0
    - appId: interfaces.eda.nokia.com
      version: v6.999.0
  dependencies:
    - file:
        path: bootstrap/intents
    - file:
        path: common/
    - file:
        path: utils/
    - file:
        path: bootstrap/api
    - file:
        path: aaa/api
    - file:
        path: interfaces/api
    - file:
        path: bootstrap/api/v1/pysrc
