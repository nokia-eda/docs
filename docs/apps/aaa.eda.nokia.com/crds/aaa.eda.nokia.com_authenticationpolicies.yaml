---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: authenticationpolicies.aaa.eda.nokia.com
spec:
  group: aaa.eda.nokia.com
  names:
    kind: AuthenticationPolicy
    listKind: AuthenticationPolicyList
    plural: authenticationpolicies
    singular: authenticationpolicy
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: AuthenticationPolicy is the Schema for the authenticationpolicies
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: An AuthenticationPolicy defines parameters that relate to
              node users, such as password complexity, lockout timers, and the order
              in which authentication methods are attempted on the node.
            properties:
              authenticationOrder:
                description: Authentication order.
                properties:
                  exitOnReject:
                    description: When set to True, a reject of an authentication server
                      will result in the user being denied access. When set to False,
                      upon reject the node will try the next authentication method
                      in the authentication order.
                    type: boolean
                  localAuthentication:
                    default: First
                    description: Local authentication priority.
                    enum:
                    - First
                    - Last
                    - Disabled
                    type: string
                  serverGroupOrder:
                    description: List of ServerGroups that define the order in which
                      authentication happens.
                    items:
                      type: string
                    type: array
                type: object
              idleTimeoutMinutes:
                description: Determines how long a user can be idle for before they
                  are logged out (in minutes). When set to zero, users are never logged
                  out.
                maximum: 1440
                minimum: 0
                type: integer
              lockoutPolicy:
                description: Lockout policy.
                properties:
                  attempts:
                    description: How many failed login attempts are allowed, set to
                      zero for unlimited attempts.
                    maximum: 64
                    minimum: 0
                    type: integer
                  lockoutMinutes:
                    description: How many minutes the user will be locked out for,
                      set to zero for indefinite (until manually unlocked).
                    maximum: 1440
                    minimum: 0
                    type: integer
                  timeMinutes:
                    description: The time window for failed attempts to occur in (in
                      minutes).
                    maximum: 60
                    minimum: 0
                    type: integer
                type: object
              nodeSelectors:
                description: Selects TopoNodes on which to configure the AuthenticationPolicy.
                items:
                  type: string
                type: array
              nodes:
                description: List of TopoNodes on which to configure the AuthenticationPolicy.
                items:
                  type: string
                type: array
              passwordComplexityRules:
                description: Password complexity rules.
                properties:
                  allowUsername:
                    description: Whether to allow the username to be part of the password.
                    type: boolean
                  maximumSequentialCharacters:
                    description: The maximum length of sequential characters in the
                      password. For example, abcd is a sequence of 4 sequential keys.
                    maximum: 8
                    minimum: 2
                    type: integer
                  minimumLength:
                    description: The minimum length of the password.
                    maximum: 12
                    minimum: 6
                    type: integer
                  minimumLowercase:
                    description: The minimum amount of lowercase characters in the
                      password.
                    maximum: 10
                    minimum: 0
                    type: integer
                  minimumNumeric:
                    description: The minimum amount of numeric characters in the password.
                    maximum: 10
                    minimum: 0
                    type: integer
                  minimumSpecial:
                    description: The minimum amount of special characters in the password.
                    maximum: 10
                    minimum: 0
                    type: integer
                  minimumUppercase:
                    description: The minimum amount of uppercase characters in the
                      password.
                    maximum: 10
                    minimum: 0
                    type: integer
                  repeatedCharacters:
                    description: How many repeated characters are allowed.
                    maximum: 8
                    minimum: 2
                    type: integer
                type: object
            type: object
          status:
            description: AuthenticationPolicyStatus defines the observed state of
              AuthenticationPolicy.
            properties:
              nodes:
                description: List of nodes this authentication policy has been applied
                  to
                items:
                  type: string
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
