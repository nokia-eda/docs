apiVersion: core.eda.nokia.com/v1
kind: Manifest
metadata:
  name: security
spec:
  group: security.eda.nokia.com
  version: v1
  title: Security
  description: |
    This application provides resources related to security for various Network Operating Systems.
  image: ghcr.io/nokia-eda/apps/security:v6.999.0
  gitReference: 1da44402c90fbeba1161ccb8ea3350ef0353843d
  gitPathPrefix: /
  author: Nokia
  appInfo:
    documentation: security/docs
    categories:
      - "system"
  supportedEndpoints:
    - "srl:24.10.*"
    - "srl:25.3.*"
    - "srl:25.7.*"
    - "srl:25.10.*"
    - "srl:26.3.*"
    - "sros:24.10.r4+"
    - "sros:25.3.r2+"
    - "sros:25.7.*"
    - "sros:25.10.*"
    - "sros:26.3.*"
    - "eos:4.33.2f:beta"
    - "nxos:10.5.2:alpha"
  supportedCoreVersions:
    - "v5.0"
  components:
    - crd:
        path: security/crds/security.eda.nokia.com_keychains.yaml
        schema: security/openapiv3/eda_oas_security.eda.nokia.com_keychains.json
        ui:
          category: Secrets
          name: Keychains
          icon: SecretKeys
        api:
          expose: readWrite
        conversionScript: security/intents/keychain/conversion_v1.py
    - crd:
        path: security/crds/security.eda.nokia.com_keychaindeployments.yaml
        schema: security/openapiv3/eda_oas_security.eda.nokia.com_keychaindeployments.json
        ui:
          category: Secrets
          name: Keychain Deployments
          icon: Deploy
        api:
          expose: readWrite
        conversionScript: security/intents/keychaindeployment/conversion_v1.py
    - script:
        path: security/intents/keychain/keychain_intent.py
        type: config
        trigger:
          kind: Keychain
    - script:
        path: security/intents/keychaindeployment/keychaindeployment_intent.py
        type: config
        trigger:
          kind: KeychainDeployment
  dependencies:
    - file:
        path: security/intents
    - file:
        path: security/api
    - file:
        path: common/
    - file:
        path: utils/
    - file:
        path: interfaces/
    - file:
        path: security/api/v1/pysrc
  requirements:
    - appId: interfaces.eda.nokia.com
      version: v6.999.0
