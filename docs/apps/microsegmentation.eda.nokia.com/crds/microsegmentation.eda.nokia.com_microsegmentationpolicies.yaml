            description: Micro Segmentation Policy applies a set of Policy Entries
              to a set of Virtual Networks, Routers, and Bridge Domains. Each entry
              consists of match criteria and actions to take when traffic matches
              the criteria. The policy is applied to all interfaces within the network-instance
              automatically.
