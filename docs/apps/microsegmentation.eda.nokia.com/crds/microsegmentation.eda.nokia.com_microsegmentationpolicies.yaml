                description: A list of entries defining the match criteria and actions
                  for this policy.
                items:
                  properties:
                    action:
                      description: Actions to take when traffic matches the defined
                        criteria. If not specified, matching traffic will be allowed
                        by default.
                      properties:
                        collectStats:
                          default: false
                          description: Collecting stats on matching traffic.
                          type: boolean
                        forward:
                          description: Allow or drop the matching traffic.
                          enum:
                          - Accept
                          - Drop
                          type: string
                        log:
                          default: false
                          description: Log matching traffic to the nodes' logging
                            facility.
                          type: boolean
                      type: object
                    bidirectional:
                      default: true
                      description: If bidirectional is set to true, the entry is duplicated
                        with source and destination match criteria reversed. Default
                        is true.
                      type: boolean
                    description:
                      description: Describes the microsegmentation policy entry
                      type: string
                    match:
