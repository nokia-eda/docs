              serviceTargets:
                description: The set of services to which this policy applies. At
                  least one of Virtual Networks, Virtual Network Selectors, Routers,
                  Router Selectors, Bridge Domains, or Bridge Domain Selectors must
                  be set. The use of Virtual Networks is recommended. Advanced If
                  Virtual Networks are used, the policy will automatically apply to
                  all interfaces in the Virtual Network. If Routers or Bridge Domains
                  are used to compose a L3 service without using Virtual Networks,
                  Group Tags with a *global scope* should be used as with a *local
                  scope* Group Tag would result in the IDs being allocated per individual
                  Router or Bridge Domain.
                properties:
                  bridgeDomainSelectors:
                    description: Bridge Domains (label selectors) to which this policy
                      applies.
                    items:
                      type: string
                    type: array
                  bridgeDomains:
