# inspired by https://github.com/goreleaser/goreleaser/blob/5adf43295767b5be05fa38a01ffb3ad25bd21797/www/htmltest.yml
# using https://github.com/wjdp/htmltest
DirectoryPath: ./site
IgnoreURLs:
  - fonts.gstatic.com
  - https://github.com/nokia-eda/docs/edit
  - https://eda-api.k8s.orb.local/
  - https://brand.nokia.com/ # requires login
  - https://github.com/settings/billing/usage # requires login
  - https://knowledge.broadcom.com/external/article/344761/enabling-and-disabling-native-drivers-in.html # typical bcom
IgnoreDirectoryMissingTrailingSlash: true
IgnoreAltMissing: true
IgnoreSSLVerify: true
IgnoreDirs:
  - overrides
IgnoreInternalEmptyHash: true
ExternalTimeout: 120
HTTPHeaders:
  "Range": "bytes=0-10"
  "Accept": "*/*"
CacheExpires: "96h"
HTTPConcurrencyLimit: 10
LogLevel: 3
DocumentConcurrencyLimit: 128
TestFilesConcurrently: true
