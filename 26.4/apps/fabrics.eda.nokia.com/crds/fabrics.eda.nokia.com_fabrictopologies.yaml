        description: FabricTopology is the Schema for the topology API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              checks:
                description: Configure dry run mode and prompts for topology operations.
                properties:
                  dryRun:
                    default: false
                    description: Enabling the Dry Run will run the transaction with
                      the calculated changes to the topology resources in the dry
                      run mode and pause the workflow awaiting users confirmation.
                    type: boolean
                  prompts:
                    description: |-
                      Prompts can be configured to request user confirmation before creating, replacing, or deleting topology resources, regardless if Dry Run is enabled or not.
                      This can be configured per operation type (BeforeCreate, BeforeReplace, BeforeDelete).
                    items:
                      enum:
                      - BeforeCreate
                      - BeforeDelete
                      - BeforeReplace
                      type: string
                    type: array
                type: object
              edgeLinkTemplates:
                description: Edge link templates used in the topology.
                items:
                  properties:
                    annotations:
                      additionalProperties:
                        type: string
                      description: Annotations to assign to the TopoLink.
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    breakouts:
                      description: Breakouts optionally defines port breakout for
                        edge link members (same semantics as inter-switch link templates).
                      items:
                        properties:
                          local:
                            description: Local breakout endpoint properties
                            properties:
                              channels:
                                description: The number of breakout channels to create
                                maximum: 8
                                minimum: 1
                                type: integer
                              speed:
                                description: Speed of each breakout channel
