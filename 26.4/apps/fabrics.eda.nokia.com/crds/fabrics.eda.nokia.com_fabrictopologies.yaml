                            type: string
                          type:
                            description: Type of the satellite node.
                            type: string
                          uplinkInterfaces:
                            description: Uplink interfaces to be created for the satellite
                              node.
                            items:
                              properties:
                                hostPort:
                                  description: HostPort interface of the satellite
                                    uplink.
                                  type: string
                                satellite:
                                  description: Satellite interface of the satellite
                                    uplink.
                                  type: string
                              required:
                              - hostPort
                              - satellite
                              type: object
                            type: array
                        required:
                        - id
                        - type
                        type: object
                      type: array
                  required:
                  - name
                  type: object
                type: array
              operation:
                default: Reconcile
                description: |-
                  Operation to be performed on the Topology.
                  Create - creates the topology resources based on the provided specifications.
                  Replace - replaces the resources matched by name with the provided specifications.
                  ReplaceAll - first removes all existing topology resources and then creates new ones based on the provided specifications.
                  Delete - deletes the resources matched by name.
                  DeleteAll - deletes all topology resources found in the namespace.
                  One of create, replace, replaceAll, reconcile, delete, deleteAll.
                enum:
                - Create
                - Replace
                - ReplaceAll
                - Delete
                - DeleteAll
                - Reconcile
                type: string
              podTemplates:
                description: Pod templates used in the topology.
                items:
                  properties:
                    edgeGroups:
                      description: Edge link groups to create in the pod.
                      items:
                        properties:
                          localNodes:
                            description: Local nodes to connect to the edge link group.
                            items:
                              properties:
                                count:
                                  description: Number of endpoints to connect to the
                                    edge link group.
                                  type: integer
                                interfaceStartIndex:
                                  default: 1
                                  description: Starting index for the interfaces.
                                  type: integer
                                nodeSelectors:
                                  description: Node selectors to select the nodes
                                    to connect to the endpoint.
                                  items:
                                    type: string
                                  type: array
                              type: object
                            type: array
                          name:
                            description: Name of the edge link group.
                            type: string
                          template:
                            description: Template name for the edge link group.
                            type: string
                        required:
                        - localNodes
                        - name
                        - template
                        type: object
                      type: array
                    islGroups:
                      description: ISL groups to create in the pod.
                      items:
                        properties:
                          interfacesPerPair:
                            default: 1
                            description: Number of interfaces per pair.
                            type: integer
                          localNodes:
                            description: Local nodes to connect to the ISL group.
                            properties:
                              interfaceStartIndex:
                                default: 1
                                description: Starting index for the interfaces.
                                type: integer
                              nodeSelectors:
                                description: Node selectors to select the nodes to
                                  connect to the endpoint.
                                items:
                                  type: string
                                type: array
                            type: object
                          name:
                            description: Name of the ISL group.
                            type: string
                          remoteNodes:
                            description: Remote nodes to connect to the ISL group.
                            properties:
                              interfaceStartIndex:
                                default: 1
                                description: Starting index for the interfaces.
                                type: integer
                              nodeSelectors:
                                description: Node selectors to select the nodes to
                                  connect to the endpoint.
                                items:
                                  type: string
                                type: array
                            type: object
                          template:
                            description: Template name for the ISL group.
                            type: string
                        required:
                        - localNodes
                        - name
                        - remoteNodes
                        - template
