                            description: Remote breakout endpoint properties
                            properties:
                              channels:
                                description: The number of breakout channels to create
                                maximum: 8
                                minimum: 1
                                type: integer
                              speed:
                                description: Speed of each breakout channel
                                enum:
                                - 800G
                                - 400G
                                - 200G
                                - 100G
                                - 50G
                                - 40G
                                - 25G
                                - 10G
                                - 2.5G
                                - 1G
                                - 100M
                                type: string
                            type: object
                        type: object
                      type: array
                    encapType:
                      default: "Null"
                      description: Enable or disable VLAN tagging on Interfaces created
                        by the TopoLink.
                      enum:
                      - "Null"
                      - Dot1q
                      type: string
                    labels:
                      additionalProperties:
                        type: string
                      description: Labels to assign to the TopoLink.
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    name:
                      description: The name of the TopoLinkTemplate.
                      type: string
                    speed:
                      description: Speed of the link.
                      enum:
                      - 800G
                      - 400G
                      - 200G
                      - 100G
                      - 50G
                      - 40G
                      - 25G
                      - 10G
                      - 2.5G
                      - 1G
                      - 100M
                      type: string
                    type:
                      description: |-
                        Specify the type of link.
                        If type is set to edge, topology information for the remote device can be set; when doing so the Remote Node can be set as the hostname of the remote device and Remote Interface as the remote interface name in the device specific format, e.g. eth0.
                      enum:
                      - Edge
                      - InterSwitch
                      - Loopback
                      type: string
                  required:
                  - name
                  type: object
                type: array
              nodeTemplates:
                description: Node templates used in the topology.
                items:
                  properties:
                    annotations:
                      additionalProperties:
                        type: string
                      description: Annotations to assign to the TopoNode.
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    components:
                      description: |-
                        List of components within the TopoNode.
                        Used to define the type and location of linecards, fabrics (SFM), media adapter cards (MDA) and control cards (CPM).
                      items:
                        properties:
                          kind:
                            description: The kind of Component, e.g. lineCard.
                            enum:
                            - controlCard
                            - lineCard
                            - fabric
                            - mda
                            - connector
                            - xiom
                            - powerShelf
                            - powerModule
                            type: string
                          slot:
                            description: |-
                              The slot this Component resides in, unset for Components that do not have a slot or ID.
                              e.g. 1 would denote the linecard slot 1, 1/1 would denote linecard slot 1 mda slot 1.
                            type: string
                          type:
                            description: Denotes the type of hardware being provisioned,
                              e.g. xcm-x20.
                            type: string
                        required:
                        - kind
                        - type
                        type: object
                      type: array
                    labels:
                      additionalProperties:
                        type: string
                      description: Labels to assign to the TopoNode.
                      type: object
