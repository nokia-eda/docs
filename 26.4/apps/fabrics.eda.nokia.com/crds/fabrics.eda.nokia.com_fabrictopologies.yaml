                                type: integer
                              speed:
                                description: Speed of each breakout channel
                                enum:
                                - 800G
                                - 400G
                                - 200G
                                - 100G
                                - 50G
                                - 40G
                                - 25G
                                - 10G
                                - 2.5G
                                - 1G
                                - 100M
                                type: string
                            type: object
                        type: object
