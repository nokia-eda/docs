            properties:
              checkStateCounters:
                description: Configure checking state paths for erroneous counter
                  increments.
                properties:
                  checks:
                    description: |-
                      Which checks to run in the CheckStateCounters stage.
                      If none are specified, all checks will be run.
                    items:
                      enum:
                      - EthernetCRC
                      - EthernetFrameSize
                      - EthernetPauseFrames
                      - CarrierTransitions
                      - DiscardedPackets
                      - TransceiverHealth
                      - LACPErrors
                      - IfPacketErrors
