                    type: boolean
                  waitTimeSeconds:
                    default: 30
                    description: Wait Time (seconds) sample interval to verify if
                      error counters increased.
                    format: int32
                    maximum: 900
                    minimum: 10
                    type: integer
                type: object
              interfaceSelectors:
                items:
