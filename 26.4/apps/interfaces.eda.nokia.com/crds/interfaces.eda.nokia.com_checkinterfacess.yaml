                                      type: string
                                    lastChange:
                                      description: Indicates when this member last
                                        changed state.
                                      type: string
                                    neighbors:
                                      description: List of discovered neighbors on
                                        this member.
                                      items:
                                        properties:
                                          interface:
                                            description: The name of a neighbor interface
                                              of this member in node specific format.
                                            type: string
                                          node:
                                            description: The name of a neighbor node
                                              of this member in node specific format.
                                            type: string
                                        type: object
                                      type: array
                                    node:
                                      description: The node on which the interface
                                        is configured.
                                      type: string
                                    nodeInterface:
                                      description: Node specific interface name, for
                                        example "ethernet-1/1", "1/1/c1/1".
                                      type: string
                                    operationalState:
                                      description: Indicates the current operational
                                        state of this member.
                                      enum:
                                      - Up
                                      - Down
                                      - Degraded
                                      - Unknown
                                      - N/A
                                      type: string
                                    speed:
                                      description: Indicates the operational speed
                                        of the member.
                                      type: string
                                  required:
