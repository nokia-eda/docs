                              - EthernetCRC
                              - EthernetFrameSize
                              - EthernetPauseFrames
                              - CarrierTransitions
                              - DiscardedPackets
                              - TransceiverHealth
                              - LACPErrors
                              - IfPacketErrors
                              type: string
                            type: array
                          interfaceName:
                            description: Interface Name
                            type: string
                          operationalState:
                            description: Indicates the current operational state of
