                                  type: object
                                type: array
                              operationalState:
                                description: Indicates the current operational state
                                  of the Interface.
                                enum:
                                - Up
                                - Down
                                - Degraded
                                - Unknown
                                - N/A
                                type: string
                              speed:
                                description: Indicates the operational speed of the
                                  Interface in aggregate.
                                type: string
                            type: object
                        required:
                        - interfaceName
                        type: object
                      type: array
                    error:
                      description: Error message, if the interface check failed.
                      type: string
                    nodeName:
                      description: Node the interface was checked on.
                      type: string
                    success:
                      description: Indicates if the interface check was successful.
                      type: boolean
                  required:
                  - nodeName
                  type: object
                type: array
              result:
                default: Failed
                description: Aggregate result of the Flow
                enum:
