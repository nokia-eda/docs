apiVersion: appstore.eda.nokia.com/v1
kind: AppInstaller
metadata:
  name: kafka-importer-install-sized
  namespace: eda-system
spec:
  operation: install
  apps:
    - appId: kafkaimporter.eda.nokia.com
      catalog: qa-eda-catalog
      version:
        value: v1.0.0
      appSettings:
        cpuLimit: "2"
        memoryLimit: 2Gi
