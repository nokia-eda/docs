                format: int32
                minimum: 1
                type: integer
              tunnelIndexPool:
                default: tunnel-index-pool
                description: Reference to a tunnel index pool to use for allocations.
                type: string
              type:
                default: EVPNVXLAN
                description: Select the type of BridgeDomain.  Simple doesn't include
                  any overlay control plane or dataplane properties (EVPN/VXLAN).
                  EVPNVXLAN includes the properties needed to provision this BridgeDomain
