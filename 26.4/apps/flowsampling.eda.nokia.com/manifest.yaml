apiVersion: core.eda.nokia.com/v1
kind: Manifest
metadata:
  name: flowsampling
spec:
  appInfo:
    categories:
      - networking
    documentation: flowsampling/docs
  author: nokia
  description: This application provides sampling (sflow, ipfix, etc) configuration for Network Operating Systems.
  group: flowsampling.eda.nokia.com
  image: ghcr.io/nokia-eda/apps/flowsampling:v6.999.0
  supportedCoreVersions:
    - "v5.0"
  title: Flow Sampling
  version: v1alpha1
  components:
    - crd:
        api:
          expose: readWrite
        path: flowsampling/crds/flowsampling.eda.nokia.com_sflows.yaml
        schema: flowsampling/openapiv3/eda_oas_flowsampling.eda.nokia.com_sflows.json
        ui:
          category: Flow Sampling
          name: sFlow
          icon: Expand
    - script:
        path: flowsampling/intents/sflow/sflow_intent.py
        trigger:
          kind: SFlow
        type: config
    - crd:
        api:
          expose: none
        path: flowsampling/crds/flowsampling.eda.nokia.com_sflowstates.yaml
        schema: flowsampling/openapiv3/eda_oas_flowsampling.eda.nokia.com_sflowstates.json
    - script:
        path: flowsampling/intents/sflowstate/sflowstate_intent.py
        trigger:
          kind: SFlowState
        type: state
  requirements:
    - appId: routing.eda.nokia.com
      version: v6.999.0
    - appId: services.eda.nokia.com
      version: v6.999.0
    - appId: bootstrap.eda.nokia.com
      version: v6.999.0
  dependencies:
    - file:
        path: flowsampling/intents
    - file:
        path: common/
    - file:
        path: utils/
    - file:
        path: filters/
    - file:
        path: qos/
    - file:
        path: routing/
    - file:
        path: routingpolicies/
    - file:
        path: services/
    - file:
        path: bootstrap/
    - file:
        path: interfaces/
    - file:
        path: flowsampling/api
    - file:
        path: flowsampling/api/v1alpha1/pysrc
  supportedEndpoints:
    - "srl:24.10.*"
    - "srl:25.3.*"
    - "srl:25.7.*"
    - "srl:25.10.*"
    - "srl:26.3.*"
    - "sros:24.10.r4+"
    - "sros:25.3.r2+"
    - "sros:25.7.*"
    - "sros:25.10.*"
    - "sros:26.3.*"
    - "eos:4.33.2f:beta"
    - "nxos:10.5.2:alpha"
