site_author: Nokia
site_description: >-
  Nokia EDA is the platform for automating your infrastructure.
# Repository
repo_name: docs
repo_url: https://github.com/nokia-eda/docs
edit_uri: edit/{versioned_branch}/docs/
site_url: https://docs.eda.dev/
# copyright date is set in the hooks/hooks.py automatically to the current year
# https://github.com/squidfunk/mkdocs-material/discussions/4969#discussioncomment-7290363
copyright: Copyright © 2023-{current_year} Nokia
theme:
  name: material
  custom_dir: docs/overrides

  # 404 page
  static_templates:
    - 404.html

  features:
    - navigation.top
    - navigation.tabs
    - navigation.instant
    - navigation.footer
    - search.suggest
    - content.code.annotate
    - content.code.copy
    # - content.code.select
    - content.action.edit
    - toc.follow
    - content.tooltips
    - content.footnote.tooltips
    - navigation.indexes

  language: en
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  font:
    code: JetBrains Mono
  icon:
    logo: nokia/nokia-white
    # repo: nokia/N-white
    edit: material/file-edit-outline
  favicon: images/n-favicon.svg

# Plugins
plugins:
  # App docs use docs/vars.yaml per app; meta plugin defaults to .meta.yml only.
  - meta:
      meta_file: vars.yaml
  - search
  - glightbox
  - crd-viewer
  - macros:
      j2_block_start_string: -{{%
      j2_block_end_string: "%}}-"
      j2_variable_start_string: -{{
      j2_variable_end_string: "}}-"
      # include_yaml:
      #   - macros/vars.yml
      include_dir: macros
      module_name: macros/main
      modules:
        - mkdocs_crd_viewer.macros
  - blog:
      post_url_format: "{slug}"
      archive: false
      categories: false
      post_excerpt_max_authors: 2
      authors_profiles: true
  - tags
  - typeset
  - optimize:
      concurrency: 1
  - minify:
      minify_html: true
  - rss:
      match_path: blog/posts/.*
      abstract_chars_count: 5000
      date_from_meta:
        as_creation: date
      categories:
        - tags
      comments_path: "#__comments"
  - git-revision-date-localized:
      enable_creation_date: true
      enabled: !ENV [ CI, false ]
  - git-committers:
      repository: nokia-eda/docs
      branch: main
      enabled: !ENV [ GIT_COMMITTERS, false ]
  - social:
      enabled: !ENV [ CI, false ]
      # enabled: true
      # debug: true
      # debug_color: yellow
      cards_layout: custom
  - redirects:
      redirect_maps:
        software-install/eda-installation-overview.md: software-install/index.md
        user-guide/topologies.md: user-guide/network-topology.md
  - privacy:
      assets_exclude:
        - giscus.app/*
        - test.draw.io/*

# Customization
extra:
  eda_version: 26.4.1 # current EDA version (provided without the v prefix)
  srl_version: 26.3.1 # latest SRL version for the current EDA version
  rook_ceph_version: v1.18.7
  talos_version: v1.11 # current talos maj.min version
  social:
    - icon: nokia/N-white
      link: https://www.nokia.com/data-center-networks/data-center-fabric/event-driven-automation/
    - icon: fontawesome/brands/discord
      link: https://eda.dev/discord
    - icon: fontawesome/brands/github
      link: https://github.com/nokia-eda/docs
  annotate:
    bash:
      - .s1
      - .s2
  version:
    provider: mike

# Extensions
markdown_extensions:
  - abbr
  - markdown.extensions.admonition
  - markdown.extensions.attr_list
  - markdown.extensions.md_in_html
  - markdown.extensions.codehilite:
      guess_lang: false
  - markdown.extensions.def_list
  - markdown.extensions.footnotes
  - toc:
      permalink: "#"
  - pymdownx.arithmatex
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji ""
      emoji_generator: !!python/name:material.extensions.emoji.to_svg ""
  - pymdownx.highlight:
      line_spans: __span
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: nokia-eda
      repo: docs
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      check_paths: true
      url_download: true
      dedent_subsections: true
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      disable_indented_code_blocks: true
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format ""
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.blocks.tab:
      alternate_style: true
  - pymdownx.blocks.admonition
  - pymdownx.blocks.definition
  - pymdownx.blocks.details
  - pymdownx.blocks.html:
      custom:
        - tag: td
          mode: block
        - tag: th
          mode: block
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - stylesheets/nokia.css
  - stylesheets/nokia-fonts.css
  - stylesheets/diagrams.css
  - stylesheets/animations.css
  - stylesheets/steps.css
  - stylesheets/expandable-blocks.css
  - stylesheets/theme-toggle.css
  - stylesheets/footer.css

hooks:
  - hooks/hooks.py

extra_javascript:
  # Privacy + mike: theme-injected mermaid URL is absolute to site_url root;
  # versioned deploys need this explicit entry for correct relative script paths.
  - javascripts/mermaid.min.js
  # https://github.com/srl-labs/learn-srlinux/pull/133
  - javascripts/sh-annotation.js
  - javascripts/expandable-blocks.js
  - javascripts/diagrams-in-tabs.js
  - javascripts/theme-toggle.js
